<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iPod Flow Premium</title>
    <style>
        :root {
            --bg: #050505;
            --accent: #ffffff;
            --glass: rgba(255, 255, 255, 0.1);
            --transition: 0.5s cubic-bezier(0.23, 1, 0.32, 1); /* Apple-style ease-out */
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: var(--bg);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* 3D Stage Optimization */
        #stage {
            flex: 1;
            perspective: 1000px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        #track {
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            transform-style: preserve-3d;
            will-change: transform; /* Hardware Acceleration */
        }

        .album {
            position: absolute;
            width: 200px;
            height: 200px;
            transition: var(--transition);
            transform-style: preserve-3d;
            will-change: transform, opacity;
            -webkit-box-reflect: below 10px linear-gradient(transparent 50%, rgba(255,255,255,0.15));
        }

        @media (max-height: 500px) { /* Landscape mobile */
            .album { width: 180px; height: 180px;margin-top: 50px; }
        }

        .album img {
            width: 100%; height: 100%;
            object-fit: cover;
            /* border-radius: 8px; */
            padding: 10px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            background: #ffffff; /* Placeholder color */
        }

        .album.active {
            filter: brightness(1.1);
        }

        /* Footer & UI */
        #footer {
            padding: 10px;
            background: linear-gradient(to top, #000 60%, transparent);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;

        }

        #song-info {
            text-align: center;
            margin-bottom: 20px;
            pointer-events: none;
        }

        #title {
            font-size: clamp(18px, 4vw, 22px);
            font-weight: 700;
            margin: 0;
            letter-spacing: -0.5px;
            display: none;
        }

        #artist {
            font-size: clamp(14px, 3vw, 16px);
            color: #ffffff;
            margin: 4px 0 0 0;
        }

        /* Progress Bar */
        #progress-container {
            width: 90%;
            max-width: 500px;
            height: 4px;
            background: rgba(255,255,255,0.1);
            /* border-radius: 10px; */
            margin-bottom: 25px;
            cursor: pointer;
            position: relative;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background: blue;
            /* border-radius: 10px; */
            transition: width 0.1s linear;
        }

        /* Controls */
        #controls {
            display: flex;
            gap: 50px;
            align-items: center;
            margin-bottom: 20px;
        }

        .btn {
            background: none;
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn:active { transform: scale(0.85); }

        #play-pause {
            font-size: 48px;
            width: 60px;
        }

        /* Loading Spinner */
        #loader {
            position: fixed;
            top: 20px; right: 20px;
            width: 20px; height: 20px;
            border: 2px solid var(--glass);
            border-top: 2px solid rgb(0, 128, 255);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <div id="loader"></div>

    <div id="stage">
        <div id="track"></div>
    </div>

    <div id="footer">
        <div id="song-info">
            <p id="title">Loading Library...</p>
            <p id="artist">Please wait</p>
        </div>

        <div id="progress-container">
            <div id="progress-bar"></div>
        </div>

        <div id="controls">
            <button class="btn" id="prev">⏮</button>
            <button class="btn" id="play-pause">▶</button>
            <button class="btn" id="next">⏭</button>
        </div>
    </div>

    <audio id="audio"></audio>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCQGE1Z_ikaZVjajxRS9TdHq23_ic7W5q4",
            authDomain: "fir-c0c18.firebaseapp.com",
            projectId: "fir-c0c18",
            storageBucket: "fir-c0c18.firebasestorage.app",
            messagingSenderId: "11840063593",
            appId: "1:11840063593:web:73ac480ff6c200b7dfbaf8"
        };

        firebase.initializeApp(firebaseConfig);
        const storage = firebase.storage();

        const track = document.getElementById('track');
        const audio = document.getElementById('audio');
        const playBtn = document.getElementById('play-pause');
        const progressBar = document.getElementById('progress-bar');
        const loader = document.getElementById('loader');

        let albums = [];
        let currentIndex = 0;
        let allItems = [];
        let loadedCount = 0;
        const BATCH_SIZE = 15;
        const audioCache = new Map();

        // --- INTERSECTION OBSERVER ---
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const img = entry.target;
                    if (img.dataset.src) {
                        img.src = img.dataset.src;
                        img.removeAttribute('dataset-src');
                    }
                }
            });
        }, { rootMargin: "300px" });

        // --- INITIALIZE ---
        async function init() {
            try {
                const res = await storage.ref("covers").listAll();
                allItems = res.items;
                await loadMore();
                updateDisplay();
            } catch (e) {
                console.error("Init failed", e);
            }
        }

        // --- LOAD BATCHES (Parallelized) ---
        async function loadMore() {
            if (loadedCount >= allItems.length) return;
            loader.style.display = 'block';

            const batch = allItems.slice(loadedCount, loadedCount + BATCH_SIZE);
            loadedCount += BATCH_SIZE;

            // Fetch all URLs in parallel for speed
            const albumData = await Promise.all(batch.map(async (item) => {
                const url = await item.getDownloadURL();
                const name = item.name.split('.')[0];
                const parts = name.split(' - ');
                return { 
                    url, 
                    name, 
                    artist: parts[0] || 'Unknown Artist', 
                    title: parts[1] || parts[0] 
                };
            }));

            albumData.forEach(data => {
                const div = document.createElement('div');
                div.className = 'album';
                
                const img = document.createElement('img');
                img.dataset.src = data.url;
                img.draggable = false;
                observer.observe(img);

                div.appendChild(img);
                div.dataset.file = data.name;
                div.dataset.title = data.title;
                div.dataset.artist = data.artist;

                track.appendChild(div);
                albums.push(div);
            });

            loader.style.display = 'none';
            render();
        }

        // --- CORE RENDER ENGINE (3D) ---
        function render() {
            if (albums.length === 0) return;

            const isMobile = window.innerWidth < 768;
            const gap = isMobile ? 120 : 160;

            albums.forEach((album, i) => {
                const offset = i - currentIndex;
                
                // Culling: Hide albums far away from view
                if (Math.abs(offset) > 6) {
                    album.style.display = 'none';
                    return;
                }
                album.style.display = 'block';

                let z = 0, rotY = 0, x = 0, opacity = 0;

                if (offset === 0) {
                    z = 250;
                    rotY = 0;
                    x = 0;
                    opacity = 1;
                    album.classList.add('active');
                } else {
                    z = 0;
                    x = (offset * gap) + (offset > 0 ? 100 : -100);
                    rotY = offset > 0 ? -45 : 45;
                    opacity = Math.max(0, 0.7 - Math.abs(offset) * 0.15);
                    album.classList.remove('active');
                }

                album.style.transform = `translateX(${x}px) translateZ(${z}px) rotateY(${rotY}deg)`;
                album.style.opacity = opacity;
                album.style.zIndex = 100 - Math.abs(offset);
            });
        }

        function updateDisplay() {
            const current = albums[currentIndex];
            if (!current) return;
            document.getElementById('title').innerText = current.dataset.title;
            document.getElementById('artist').innerText = current.dataset.artist;
            
            // Auto-load more when reaching the end
            if (currentIndex > albums.length - 5) loadMore();
        }

        // --- CONTROLS ---
        function move(dir) {
            let next = currentIndex + dir;
            if (next >= 0 && next < albums.length) {
                currentIndex = next;
                render();
                updateDisplay();
                // Preload audio for premium transition
                if (dir > 0) preloadAudio(currentIndex + 1);
            }
        }

        async function togglePlay() {
            const current = albums[currentIndex];
            const file = current.dataset.file;
            const url = await getAudioURL(file);

            if (audio.src !== url) {
                audio.src = url;
                audio.play();
            } else {
                audio.paused ? audio.play() : audio.pause();
            }
        }

        async function getAudioURL(file) {
            if (audioCache.has(file)) return audioCache.get(file);
            const url = await storage.ref(`MyMusic/${file}.mp3`).getDownloadURL();
            audioCache.set(file, url);
            return url;
        }

        async function preloadAudio(index) {
            if (index < albums.length) {
                const file = albums[index].dataset.file;
                getAudioURL(file); // Trigger fetch and cache
            }
        }

        // --- SWIPE LOGIC ---
        let touchStartX = 0;
        document.addEventListener('touchstart', e => touchStartX = e.touches[0].clientX);
        document.addEventListener('touchend', e => {
            const touchEndX = e.changedTouches[0].clientX;
            const diff = touchStartX - touchEndX;
            if (Math.abs(diff) > 50) move(diff > 0 ? 1 : -1);
        });

        // --- EVENT LISTENERS ---
        document.getElementById('prev').onclick = () => move(-1);
        document.getElementById('next').onclick = () => move(1);
        document.getElementById('play-pause').onclick = togglePlay;

        audio.onplay = () => playBtn.innerText = "⏸";
        audio.onpause = () => playBtn.innerText = "▶";
        audio.onended = () => move(1); // Premium: Auto-play next

        audio.ontimeupdate = () => {
            const pct = (audio.currentTime / audio.duration) * 100 || 0;
            progressBar.style.width = pct + "%";
        };

        // Click on progress bar to seek
        document.getElementById('progress-container').onclick = (e) => {
            const rect = e.currentTarget.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const pct = x / rect.width;
            audio.currentTime = pct * audio.duration;
        };

        // Keyboard support
        window.addEventListener('keydown', e => {
            if (e.key === "ArrowRight") move(1);
            if (e.key === "ArrowLeft") move(-1);
            if (e.key === " ") togglePlay();
        });

        init();
    </script>
</body>
</html>
