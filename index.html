<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iPod Mobile Flow</title>
    <style>
        :root {
            --bg: #000;
            --accent: #fff;
            --transition: 0.6s cubic-bezier(0.2, 0, 0.2, 1);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: var(--bg);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* 🔥 MOBILE LANDSCAPE OPTIMIZATION */
        #stage {
            flex: 1;
            perspective: 1200px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding-top: 20px; /* Space from top */
        }

        /* Invisible Tap Zones for Navigation */
        .nav-zone {
            position: absolute;
            top: 0; bottom: 0;
            width: 35%;
            z-index: 1000;
            cursor: pointer;
        }
        #zone-left { left: 0; }
        #zone-right { right: 0; }

        #track {
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            transform-style: preserve-3d;
        }

        /* 🔥 ALBUM ART & REFLECTION */
        .album {
            position: absolute;
            width: 240px; /* Scaled for mobile landscape */
            height: 240px;
            transition: var(--transition);
            transform-style: preserve-3d;
            /* Stronger Reflection */
            -webkit-box-reflect: below 4px linear-gradient(transparent 30%, rgba(255,255,255,0.15));
        }

        .album img {
            width: 100%; height: 100%;
            object-fit: cover;
            border-radius: 4px;
            box-shadow: 0 20px 50px rgba(0,0,0,1);
        }

        /* Active Album Glow */
        .album.active {
            box-shadow: 0 0 40px rgba(255,255,255,0.1);
        }

        /* 🔥 CENTERED FOOTER & TRUNCATED TEXT */
        #footer {
            height: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(to top, #0a0a0a, transparent);
            z-index: 1100;
            padding: 0 20px;
        }

        #song-info { 
            text-align: center; 
            margin-bottom: 10px;
            width: 100%;
            max-width: 80vw; /* Keeps text from hitting screen edges */
        }

        #title { 
            font-size: 18px; 
            font-weight: 700; 
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis; /* The "..." look */
        }

        #artist { 
            font-size: 13px; 
            color: #999; 
            margin: 3px 0 0 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* UI Elements */
        #progress-wrap {
            width: 90%;
            max-width: 400px;
            height: 3px;
            background: rgba(255,255,255,0.1);
            margin-bottom: 15px;
            border-radius: 2px;
            overflow: hidden;
        }
        #progress-bar {
            width: 0%; height: 100%;
            background: var(--accent);
        }

        #playback-btns { display: flex; gap: 40px; align-items: center; }
        .btn {
            background: none; border: none; color: white;
            font-size: 22px; cursor: pointer;
            opacity: 0.8;
        }
        #play-pause { font-size: 38px; width: 50px; opacity: 1; }

    </style>
</head>
<body>

    <div id="zone-left" class="nav-zone"></div>
    <div id="zone-right" class="nav-zone"></div>

    <div id="stage">
        <div id="track"></div>
    </div>

    <div id="footer">
        <div id="song-info">
            <p id="title">Select Music</p>
            <p id="artist">Artist Name</p>
        </div>

        <div id="progress-wrap">
            <div id="progress-bar"></div>
        </div>

        <div id="playback-btns">
            <button class="btn" onclick="move(-1)">⏮</button>
            <button class="btn" id="play-pause" onclick="togglePlay()">▶</button>
            <button class="btn" onclick="move(1)">⏭</button>
        </div>
    </div>

    <audio id="audio"></audio>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCQGE1Z_ikaZVjajxRS9TdHq23_ic7W5q4",
            authDomain: "fir-c0c18.firebaseapp.com",
            projectId: "fir-c0c18",
            storageBucket: "fir-c0c18.firebasestorage.app",
            messagingSenderId: "11840063593",
            appId: "1:11840063593:web:73ac480ff6c200b7dfbaf8"
        };

        firebase.initializeApp(firebaseConfig);
        const storage = firebase.storage();
        
        const track = document.getElementById('track');
        const audio = document.getElementById('audio');
        const playBtn = document.getElementById('play-pause');
        const progressBar = document.getElementById('progress-bar');

        let albums = [];
        let currentIndex = 0;

        async function init() {
            const res = await storage.ref("covers").listAll();
            for (let item of res.items) {
                const url = await item.getDownloadURL();
                const name = item.name.split('.')[0];
                const parts = name.split(' - ');
                const artist = parts[0] || 'Unknown Artist';
                const title = parts[1] || parts[0];

                const div = document.createElement('div');
                div.className = 'album';
                div.innerHTML = `<img src="${url}" draggable="false">`;
                div.dataset.file = name;
                div.dataset.title = title;
                div.dataset.artist = artist;

                track.appendChild(div);
                albums.push(div);
            }
            render();
        }

        function render() {
            if (albums.length === 0) return;

            albums.forEach((album, i) => {
                const offset = i - currentIndex;
                let transform = "";
                let opacity = 1;
                let zIndex = 100 - Math.abs(offset);

                album.classList.remove('active');

                if (offset === 0) {
                    // Center Active
                    transform = `translateX(0) translateZ(240px) rotateY(0deg)`;
                    album.classList.add('active');
                    document.getElementById('title').innerText = album.dataset.title;
                    document.getElementById('artist').innerText = album.dataset.artist;
                } else if (offset < 0) {
                    // Left Side
                    transform = `translateX(${(offset * 100) - 140}px) translateZ(0) rotateY(50deg)`;
                    opacity = 0.5;
                } else {
                    // Right Side
                    transform = `translateX(${(offset * 100) + 140}px) translateZ(0) rotateY(-50deg)`;
                    opacity = 0.5;
                }

                album.style.transform = transform;
                album.style.opacity = opacity;
                album.style.zIndex = zIndex;
            });
        }

        function move(dir) {
            let nextIndex = currentIndex + dir;
            if (nextIndex >= 0 && nextIndex < albums.length) {
                currentIndex = nextIndex;
                render();
            }
        }

        document.getElementById('zone-left').onclick = () => move(-1);
        document.getElementById('zone-right').onclick = () => move(1);

        async function togglePlay() {
            const current = albums[currentIndex];
            const file = current.dataset.file;
            
            try {
                const url = await storage.ref(`MyMusic/${file}.mp3`).getDownloadURL();
                if (audio.src !== url) {
                    audio.src = url;
                    audio.play();
                } else {
                    audio.paused ? audio.play() : audio.pause();
                }
            } catch (e) {
                alert("Audio file not found in MyMusic folder.");
            }
        }

        audio.onplay = () => playBtn.innerText = "⏸";
        audio.onpause = () => playBtn.innerText = "▶";
        audio.ontimeupdate = () => {
            const pct = (audio.currentTime / audio.duration) * 100 || 0;
            progressBar.style.width = pct + "%";
        };

        init();
    </script>
</body>
</html>
